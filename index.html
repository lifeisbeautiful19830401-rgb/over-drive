<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#17171c">
  <title>OVER/DRIVE - 広島ドライブチャレンジ</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 車種選択：スマホでは横長の表をコンパクトなカードへ変換 */
    @media (max-width: 700px) {
      #carScreen.active {
        min-height: calc(100dvh - var(--safe-top) - var(--safe-bottom));
        justify-content: flex-start;
        gap: 9px;
        padding-top: 8px;
      }

      #carScreen h2 {
        font-size: clamp(1.7rem, 9vw, 2.35rem);
      }

      #carScreen .table-wrap {
        width: min(100%, 480px);
        overflow: visible;
        border: 0;
        background: transparent;
        box-shadow: none;
      }

      #carScreen table {
        display: block;
        width: 100%;
        min-width: 0;
      }

      #carScreen thead {
        display: none;
      }

      #carScreen tbody {
        display: grid;
        gap: 8px;
      }

      #carScreen tr {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        grid-template-areas:
          "name speed fuel"
          "description description select";
        gap: 5px 8px;
        align-items: center;
        min-height: 93px;
        padding: 9px;
        border: 3px solid #f8f5dc;
        border-radius: 12px;
        background: rgba(36, 36, 43, 0.96);
        box-shadow: 4px 4px 0 #000;
      }

      #carScreen td {
        min-width: 0;
        padding: 0;
        border: 0;
        text-align: left;
        line-height: 1.25;
      }

      #carScreen td:nth-child(1) {
        grid-area: name;
        color: #ffd447;
        font-size: 1.08rem;
      }

      #carScreen td:nth-child(2) {
        grid-area: description;
        display: -webkit-box;
        overflow: hidden;
        color: #e5e4e9;
        font-size: 0.73rem;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      #carScreen td:nth-child(3) {
        grid-area: speed;
      }

      #carScreen td:nth-child(4) {
        grid-area: fuel;
      }

      #carScreen td:nth-child(3),
      #carScreen td:nth-child(4) {
        padding: 5px 7px;
        border-radius: 7px;
        color: #17171c;
        background: #9fe8ff;
        font-size: 0.72rem;
        font-weight: 900;
        text-align: center;
        white-space: nowrap;
      }

      #carScreen td:nth-child(3)::before {
        content: "最高 ";
      }

      #carScreen td:nth-child(4)::before {
        content: "燃料 ";
      }

      #carScreen td:nth-child(5) {
        grid-area: select;
      }

      #carScreen td:nth-child(5) button {
        width: auto;
        min-width: 105px;
        padding: 9px 8px;
        border-width: 2px;
        border-radius: 9px;
        font-size: 0.75rem;
        box-shadow: 3px 3px 0 #000;
      }

      #carScreen > .sub-button {
        padding: 9px 14px;
        font-size: 0.8rem;
      }
    }

    /* スマホ操作：左は十字キー、右はペダルとショット */
    @media (hover: none), (pointer: coarse) {
      .touch-controls {
        grid-template-columns: minmax(0, 1.08fr) minmax(0, 0.92fr);
        align-items: stretch;
        gap: 8px;
        padding: 6px 7px max(6px, var(--safe-bottom));
      }

      .control-hint {
        display: none;
      }

      .cluster-label {
        margin-bottom: 4px;
        font-size: 0.68rem;
        text-align: center;
      }

      .move-pad {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-template-rows: repeat(3, minmax(48px, 1fr));
        gap: 4px;
        height: 100%;
        min-height: 158px;
      }

      .move-pad button[data-key="up"] {
        grid-column: 2;
        grid-row: 1;
      }

      .move-pad button[data-key="left"] {
        grid-column: 1;
        grid-row: 2;
      }

      .move-pad button[data-key="right"] {
        grid-column: 3;
        grid-row: 2;
      }

      .move-pad button[data-key="down"] {
        grid-column: 2;
        grid-row: 3;
      }

      .move-pad button {
        min-height: 48px;
        padding: 2px;
        border-radius: 15px;
        background: linear-gradient(180deg, #dff7ff, #78bdda);
      }

      .move-pad button .button-icon {
        margin: 0;
        font-size: clamp(1.55rem, 7vw, 2.1rem);
      }

      .move-pad button .button-label {
        display: none;
      }

      .pedals {
        display: grid;
        grid-template-columns: minmax(0, 0.85fr) minmax(0, 1.15fr);
        grid-template-rows: 1fr 1fr;
        gap: 6px;
        min-height: 158px;
      }

      .pedals .shot-button {
        grid-column: 1;
        grid-row: 1;
      }

      .pedals .brake-button {
        grid-column: 1;
        grid-row: 2;
      }

      .pedals .accelerate-button {
        grid-column: 2;
        grid-row: 1 / 3;
        min-height: 158px;
      }

      .pedals button {
        min-height: 0;
        padding: 5px 3px;
        border-radius: 16px;
        font-size: clamp(0.68rem, 3.2vw, 0.9rem);
      }

      .pedals button .button-icon {
        margin-bottom: 5px;
        font-size: clamp(1.4rem, 7vw, 2rem);
      }

      .accelerate-button .button-icon {
        font-size: clamp(2rem, 10vw, 3rem) !important;
      }

      .accelerate-button {
        border-color: #d9ffe7 !important;
        box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.16), 3px 3px 0 #08080a !important;
      }

      .brake-button {
        border-color: #fff0b5 !important;
      }

      .shot-button {
        border-color: #ffd5d1 !important;
      }

      #gameCanvas {
        max-height: calc(100dvh - 326px - var(--safe-top) - var(--safe-bottom));
      }
    }

    @media (hover: none) and (max-width: 390px), (pointer: coarse) and (max-width: 390px) {
      .move-pad,
      .pedals {
        min-height: 145px;
      }

      .move-pad {
        grid-template-rows: repeat(3, minmax(44px, 1fr));
      }

      .pedals .accelerate-button {
        min-height: 145px;
      }

      #gameCanvas {
        max-height: calc(100dvh - 306px - var(--safe-top) - var(--safe-bottom));
      }
    }

    @media (hover: none) and (max-height: 700px), (pointer: coarse) and (max-height: 700px) {
      .cluster-label {
        display: none;
      }

      .move-pad,
      .pedals,
      .pedals .accelerate-button {
        min-height: 126px;
      }

      .move-pad {
        grid-template-rows: repeat(3, minmax(38px, 1fr));
      }

      #gameCanvas {
        max-height: calc(100dvh - 250px - var(--safe-top) - var(--safe-bottom));
      }
    }
  </style>
</head>
<body>
  <main class="game-shell">
    <section id="titleScreen" class="screen active title-screen">
      <p class="eyebrow">HIROSHIMA ARCADE DRIVE</p>
      <h1>OVER<span>/</span>DRIVE</h1>
      <p class="subtitle">広島ドライブチャレンジ</p>
      <p>アクセルとブレーキを使い分け、広島の道を安全に走り抜けよう。ショットゲージを溜めると障害物をクリアできます。</p>
      <p class="mobile-note">スマホでは画面下の大型ボタンを両手で操作できます。</p>
      <button id="startButton" class="primary-button">ゲームスタート</button>
    </section>

    <section id="carScreen" class="screen">
      <h2>車種選択</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>車種</th>
              <th>特徴</th>
              <th>最高速度</th>
              <th>燃料</th>
              <th>選択</th>
            </tr>
          </thead>
          <tbody id="carTableBody"></tbody>
        </table>
      </div>
      <button class="sub-button" data-screen="titleScreen">タイトルへ戻る</button>
    </section>

    <section id="stageScreen" class="screen">
      <h2>ステージ選択</h2>
      <div id="stageList" class="stage-grid"></div>
      <button class="sub-button" data-screen="carScreen">車種選択へ戻る</button>
    </section>

    <section id="gameScreen" class="screen game-screen">
      <div class="hud" aria-label="ゲーム情報">
        <div class="hud-card">
          <span>スコア</span>
          <strong id="scoreText">0</strong>
        </div>
        <div class="hud-card">
          <span>レベル</span>
          <strong id="levelText">1</strong>
        </div>
        <div class="hud-card wide">
          <span>燃料</span>
          <div class="bar"><div id="fuelBar" class="bar-fill fuel"></div></div>
        </div>
        <div class="hud-card wide">
          <span>速度</span>
          <strong id="speedText">0 km/h</strong>
          <div class="bar"><div id="speedBar" class="bar-fill speed"></div></div>
        </div>
        <div class="hud-card wide">
          <span>SHOT</span>
          <strong id="shotText">0%</strong>
          <div class="bar"><div id="shotBar" class="bar-fill shot"></div></div>
        </div>
        <div class="hud-card">
          <span>シールド</span>
          <strong id="shieldText">なし</strong>
        </div>
      </div>

      <canvas id="gameCanvas" width="480" height="900" aria-label="OVER DRIVE ゲーム画面"></canvas>

      <div id="touchControls" class="touch-controls" aria-label="スマホ操作">
        <p class="control-hint">ボタンは押している間だけ動作します</p>

        <div class="control-cluster steering-cluster">
          <span class="cluster-label">ハンドル操作</span>
          <div class="move-pad">
            <button type="button" data-key="left" aria-label="左へ移動"><span class="button-icon">◀</span><span class="button-label">左</span></button>
            <button type="button" data-key="up" aria-label="前へ移動"><span class="button-icon">▲</span><span class="button-label">前</span></button>
            <button type="button" data-key="down" aria-label="後ろへ移動"><span class="button-icon">▼</span><span class="button-label">後</span></button>
            <button type="button" data-key="right" aria-label="右へ移動"><span class="button-icon">▶</span><span class="button-label">右</span></button>
          </div>
        </div>

        <div class="control-cluster action-cluster">
          <span class="cluster-label">ペダル・攻撃</span>
          <div class="pedals">
            <button type="button" data-key="brake" class="brake-button" aria-label="ブレーキ"><span class="button-icon">■</span><span>ブレーキ</span></button>
            <button type="button" data-action="shoot" class="shot-button" aria-label="ショット"><span class="button-icon">◎</span><span>ショット</span></button>
            <button type="button" data-key="accelerate" class="accelerate-button" aria-label="アクセル"><span class="button-icon">▲</span><span>アクセル</span></button>
          </div>
        </div>
      </div>
    </section>

    <section id="gameOverScreen" class="screen">
      <h2 id="gameOverTitle">ゲームオーバー</h2>
      <p id="gameOverMessage">安全運転で再挑戦しよう。</p>
      <p class="final-score">最終スコア: <strong id="finalScoreText">0</strong></p>
      <button id="retryButton" class="primary-button">もう一度プレイ</button>
      <button id="backToCarButton" class="sub-button">車種選択に戻る</button>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    (() => {
      const controls = document.getElementById("touchControls");
      if (!controls) return;

      controls.addEventListener("contextmenu", (event) => event.preventDefault());
      controls.addEventListener("pointerdown", (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        button.classList.add("is-pressed");
        if (navigator.vibrate) navigator.vibrate(8);
      });

      ["pointerup", "pointercancel", "pointerleave"].forEach((eventName) => {
        controls.addEventListener(eventName, (event) => {
          const button = event.target.closest("button");
          if (button) button.classList.remove("is-pressed");
        });
      });
    })();
  </script>
</body>
</html>
