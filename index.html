<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#17171c">
  <title>OVER/DRIVE - 広島ドライブチャレンジ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <section id="titleScreen" class="screen active title-screen">
      <p class="eyebrow">HIROSHIMA ARCADE DRIVE</p>
      <h1>OVER<span>/</span>DRIVE</h1>
      <p class="subtitle">広島ドライブチャレンジ</p>
      <p>アクセルとブレーキを使い分け、広島の道を安全に走り抜けよう。ショットゲージを溜めると障害物をクリアできます。</p>
      <p class="mobile-note">スマホでは画面下の大型ボタンを両手で操作できます。</p>
      <button id="startButton" class="primary-button">ゲームスタート</button>
    </section>

    <section id="carScreen" class="screen">
      <h2>車種選択</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>車種</th>
              <th>特徴</th>
              <th>最高速度</th>
              <th>燃料</th>
              <th>選択</th>
            </tr>
          </thead>
          <tbody id="carTableBody"></tbody>
        </table>
      </div>
      <button class="sub-button" data-screen="titleScreen">タイトルへ戻る</button>
    </section>

    <section id="stageScreen" class="screen">
      <h2>ステージ選択</h2>
      <div id="stageList" class="stage-grid"></div>
      <button class="sub-button" data-screen="carScreen">車種選択へ戻る</button>
    </section>

    <section id="gameScreen" class="screen game-screen">
      <div class="hud" aria-label="ゲーム情報">
        <div class="hud-card">
          <span>スコア</span>
          <strong id="scoreText">0</strong>
        </div>
        <div class="hud-card">
          <span>レベル</span>
          <strong id="levelText">1</strong>
        </div>
        <div class="hud-card wide">
          <span>燃料</span>
          <div class="bar"><div id="fuelBar" class="bar-fill fuel"></div></div>
        </div>
        <div class="hud-card wide">
          <span>速度</span>
          <strong id="speedText">0 km/h</strong>
          <div class="bar"><div id="speedBar" class="bar-fill speed"></div></div>
        </div>
        <div class="hud-card wide">
          <span>SHOT</span>
          <strong id="shotText">0%</strong>
          <div class="bar"><div id="shotBar" class="bar-fill shot"></div></div>
        </div>
        <div class="hud-card">
          <span>シールド</span>
          <strong id="shieldText">なし</strong>
        </div>
      </div>

      <canvas id="gameCanvas" width="480" height="900" aria-label="OVER DRIVE ゲーム画面"></canvas>

      <div id="touchControls" class="touch-controls" aria-label="スマホ操作">
        <p class="control-hint">ボタンは押している間だけ動作します</p>

        <div class="control-cluster steering-cluster">
          <span class="cluster-label">方向</span>
          <div class="move-pad">
            <button type="button" data-key="left" aria-label="左へ移動"><span class="button-icon">◀</span><span>左</span></button>
            <button type="button" data-key="up" aria-label="前へ移動"><span class="button-icon">▲</span><span>前</span></button>
            <button type="button" data-key="down" aria-label="後ろへ移動"><span class="button-icon">▼</span><span>後</span></button>
            <button type="button" data-key="right" aria-label="右へ移動"><span class="button-icon">▶</span><span>右</span></button>
          </div>
        </div>

        <div class="control-cluster action-cluster">
          <span class="cluster-label">速度・攻撃</span>
          <div class="pedals">
            <button type="button" data-key="brake" class="brake-button" aria-label="ブレーキ"><span class="button-icon">■</span><span>BRAKE</span></button>
            <button type="button" data-action="shoot" class="shot-button" aria-label="ショット"><span class="button-icon">●</span><span>SHOT</span></button>
            <button type="button" data-key="accelerate" class="accelerate-button" aria-label="アクセル"><span class="button-icon">▲</span><span>ACCEL</span></button>
          </div>
        </div>
      </div>
    </section>

    <section id="gameOverScreen" class="screen">
      <h2 id="gameOverTitle">ゲームオーバー</h2>
      <p id="gameOverMessage">安全運転で再挑戦しよう。</p>
      <p class="final-score">最終スコア: <strong id="finalScoreText">0</strong></p>
      <button id="retryButton" class="primary-button">もう一度プレイ</button>
      <button id="backToCarButton" class="sub-button">車種選択に戻る</button>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    (() => {
      const controls = document.getElementById("touchControls");
      if (!controls) return;

      controls.addEventListener("contextmenu", (event) => event.preventDefault());
      controls.addEventListener("pointerdown", (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        button.classList.add("is-pressed");
        if (navigator.vibrate) navigator.vibrate(8);
      });

      ["pointerup", "pointercancel", "pointerleave"].forEach((eventName) => {
        controls.addEventListener(eventName, (event) => {
          const button = event.target.closest("button");
          if (button) button.classList.remove("is-pressed");
        });
      });
    })();
  </script>
</body>
</html>
